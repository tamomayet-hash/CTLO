body{

.container{
max-width:460px;
margin:auto;
padding:45px 22px;
text-align:center;
}

/* NAME - FORCE SINGLE LINE */
.name{
font-size:24px;
font-weight:600;
letter-spacing:1px;
margin-bottom:8px;
white-space:nowrap;   /* 🔥 prevents line break */
overflow:hidden;
text-overflow:ellipsis;
}

/* TITLE */
.title{
font-size:14px;
letter-spacing:2px;
text-transform:uppercase;
color:#444;
margin-bottom:4px;
}

/* LAW OFFICE */
.office{
font-size:16px;
margin-bottom:20px;
color:#111;
}

.line{
width:60px;
height:1px;
background:#111;
margin:20px auto;
}

/* ACTIONS */
.actions{
display:flex;
justify-content:space-between;
margin:20px 0;
}

.actions a{
text-decoration:none;
color:#111;
font-size:13px;
width:33%;
}

.actions i{
display:block;
font-size:18px;
margin-bottom:6px;
}

/* BUTTON */
.add-contact{
display:block;
margin:25px 0;
padding:14px;
border:1px solid #111;
text-decoration:none;
color:#111;
letter-spacing:1px;
transition:0.3s;
}

.add-contact:hover{
background:#111;
color:#fff;
}

/* CARDS */
.card{
border-top:1px solid #eee;
padding:18px 0;
text-align:left;
}

.card h3{
font-size:13px;
letter-spacing:2px;
margin-bottom:10px;
}

.item{
margin:8px 0;
font-size:15px;
}

.item a{
text-decoration:none;
color:#111;
}

/* SOCIAL */
.social{
display:flex;
justify-content:center;
gap:25px;
margin-top:25px;
font-size:18px;
}

.social a{
color:#111;
}

</style>
